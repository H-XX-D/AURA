name: Build and Publish npm Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-apple-darwin,aarch64-apple-darwin,x86_64-pc-windows-msvc

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev

    - name: Install npm dependencies
      run: |
        cd tools/packages/aura-node-native
        npm ci

    - name: Build all platform binaries
      run: |
        cd tools/packages/aura-node-native
        # Build Linux binaries (native)
        npx napi build --platform --release --target x86_64-unknown-linux-gnu
        npx napi build --platform --release --target aarch64-unknown-linux-gnu
        # Build macOS binaries (cross-compilation may not work perfectly)
        npx napi build --platform --release --target x86_64-apple-darwin || echo "macOS x64 cross-compilation failed, skipping"
        npx napi build --platform --release --target aarch64-apple-darwin || echo "macOS ARM64 cross-compilation failed, skipping"
        # Build Windows binary (cross-compilation may not work perfectly)
        npx napi build --platform --release --target x86_64-pc-windows-msvc || echo "Windows cross-compilation failed, skipping"

    - name: Prepare package for publishing
      run: |
        cd tools/packages/aura-node-native
        
        # Copy package files
        mkdir -p ../publish-package
        cp package.json ../publish-package/
        cp index.js ../publish-package/
        cp index.d.ts ../publish-package/
        
        # Copy all built binaries (whatever was successfully built)
        cp *.node ../publish-package/ 2>/dev/null || echo "No binaries found"
        
        cd ../publish-package
        echo "Files to be published:"
        ls -la

    - name: Publish to npm
      run: |
        cd tools/packages/aura-node-native/../publish-package
        # Set npm token
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        npm publish --ignore-scripts
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
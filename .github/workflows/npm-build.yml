name: Build and Publish npm Package

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential pkg-config libssl-dev

    - name: Install npm dependencies
      run: |
        cd tools/packages/aura-node-native
        npm ci

    - name: Build all platform binaries
      run: |
        cd tools/packages/aura-node-native
        # Clean any existing binaries first
        rm -f *.node
        # Build Linux binaries (native - these work reliably)
        npx napi build --platform --release --target x86_64-unknown-linux-gnu
        npx napi build --platform --release --target aarch64-unknown-linux-gnu
        # Verify binaries were created
        echo "Built binaries:"
        ls -la *.node

    - name: Prepare package for publishing
      run: |
        cd tools/packages/aura-node-native
        echo "Package contents:"
        ls -la
        echo "Package.json contents:"
        cat package.json

    - name: Publish to npm
      run: |
        cd tools/packages/aura-node-native
        echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        npm publish --ignore-scripts
      env:
        NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
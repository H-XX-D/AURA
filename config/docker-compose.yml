version: '3.8'

services:
  # Main AURA Compression Server
  aura-server:
    build:
      context: ..
      dockerfile: config/dockerfile
      target: production
    ports:
      - "8765:8765"
    environment:
      - AURA_ENABLE_AUDIT=true
      - AURA_LOG_LEVEL=info
      - AURA_TEMPLATE_STORE=/data/templates.json
      - AURA_METRICS_ENABLED=true
    volumes:
      - aura_data:/data
      - aura_logs:/app/logs
    networks:
      - aura-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import aura_compression; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - redis
      - postgres

  # Development Server
  aura-dev:
    build:
      context: ..
      dockerfile: config/dockerfile
      target: development
    ports:
      - "8766:8765"
      - "9229:9229"  # Node.js debugger
    environment:
      - AURA_DEBUG=true
      - AURA_LOG_LEVEL=debug
      - NODE_ENV=development
    volumes:
      - ..:/app
      - /app/node_modules
      - aura_data:/data
      - aura_logs:/app/logs
    networks:
      - aura-network
    profiles:
      - dev
    depends_on:
      - redis
      - postgres

  # Benchmark Service
  aura-benchmark:
    build:
      context: ..
      dockerfile: config/dockerfile
      target: benchmark
    environment:
      - AURA_BENCHMARK_ITERATIONS=1000
      - AURA_BENCHMARK_CONCURRENT=10
    volumes:
      - aura_results:/app/results
      - aura_logs:/app/logs
    networks:
      - aura-network
    profiles:
      - benchmark
    depends_on:
      - aura-server

  # Redis for caching and session management
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aura-network
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}

  # PostgreSQL for audit logs and metadata
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=aura_compression
      - POSTGRES_USER=aura
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-aura_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - aura-network
    restart: unless-stopped

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - aura-network
    depends_on:
      - aura-server
    profiles:
      - proxy
    restart: unless-stopped

  # Monitoring with Prometheus
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aura-network
    profiles:
      - monitoring
    restart: unless-stopped

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - aura-network
    profiles:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

  # ELK Stack for logging (optional)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - aura-network
    profiles:
      - logging
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    ports:
      - "5044:5044"
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    networks:
      - aura-network
    profiles:
      - logging
    depends_on:
      - elasticsearch
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    ports:
      - "5601:5601"
    networks:
      - aura-network
    profiles:
      - logging
    depends_on:
      - elasticsearch
    restart: unless-stopped

volumes:
  aura_data:
    driver: local
  aura_logs:
    driver: local
  aura_results:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  aura-network:
    driver: bridge

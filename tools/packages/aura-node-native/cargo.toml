[package]
name = "aura-compression"
version = "2.0.0"
edition = "2021"
description = "AURA Protocol - Proprietary AI-driven compression technology with native performance"
license = "SEE LICENSE IN LICENSE"
repository = "https://github.com/hendrixx-cnc/AURA.git"
authors = ["Todd Hendricks <todd@auraprotocol.org>"]
homepage = "https://auraprotocol.org"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2", features = ["serde-json"] }
napi-derive = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[build-dependencies]
napi-build = "2"
